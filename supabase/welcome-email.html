<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Confirm your Hillsum account</title>
</head>
<body style="margin: 0; padding: 0; background-color: #f5f5f7; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;">
  <table width="100%" border="0" cellspacing="0" cellpadding="0">
    <tr>
      <td align="center" style="padding: 60px 20px;">
        <table width="100%" border="0" cellspacing="0" cellpadding="0" style="max-width: 500px; background-color: #ffffff; border-radius: 24px; overflow: hidden; box-shadow: 0 4px 24px rgba(0,0,0,0.04);">
          
          <tr>
            <td align="center" style="padding: 50px 40px;">
              <h2 style="margin: 0; font-size: 14px; font-weight: 600; color: #86868b; letter-spacing: 0.05em; text-transform: uppercase;">Hillsum</h2>
              
              <h1 style="margin: 24px 0 16px 0; font-size: 32px; font-weight: 700; color: #1d1d1f; letter-spacing: -0.02em;">Verify your email.</h1>
              
              <p style="margin: 0 0 32px 0; font-size: 17px; line-height: 1.5; color: #424245; font-weight: 400;">
                To finish setting up your account and start your first focus session, click the button below.
              </p>

              <table border="0" cellspacing="0" cellpadding="0">
                <tr>
                  <td align="center" style="border-radius: 12px; background-color: #0071e3;">
                    <a href="{{ .ConfirmationURL }}" target="_blank" style="display: inline-block; padding: 14px 32px; font-size: 17px; font-weight: 500; color: #ffffff; text-decoration: none;">
                      Confirm Account
                    </a>
                  </td>
                </tr>
              </table>

              <p style="margin: 32px 0 0 0; font-size: 14px; color: #86868b;">
                This link will expire in 24 hours.
              </p>
            </td>
          </tr>

          <tr>
            <td style="padding: 30px 40px; background-color: #fbfbfd; border-top: 1px solid #f5f5f7; text-align: center;">
              <p style="margin: 0; font-size: 12px; color: #86868b; line-height: 1.4;">
                If you did not request this email, you can safely ignore it. <br>
                Hillsum Support • 2026
              </p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
